<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EKAFY Dashboard</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="globalMessageBar" class="global-message-bar" role="status" aria-live="polite" hidden>
      <span class="global-message-text"></span>
      <button type="button" class="global-message-close" aria-label="Dismiss message">×</button>
    </div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">E</div>
          <div>
            <h1>EKAFY</h1>
            <p id="userRole">Control panel</p>
          </div>
        </div>

        <nav class="nav-list" aria-label="Main">
          <a class="active" href="/dashboard.html">Dashboard</a>
          <a href="#services">Services</a>
          <a href="#projects">Projects</a>
          <a href="#access">Users</a>
        </nav>

        <button id="logoutButton" class="ghost-button" type="button">Log out</button>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Server overview</p>
            <h2>Dashboard</h2>
          </div>
          <div class="refresh-pill">Auto refresh: 5s</div>
        </header>

        <section class="metric-grid" aria-label="System metrics">
          <article class="metric-card">
            <span>CPU</span>
            <strong id="cpuValue">--%</strong>
            <div class="meter"><div id="cpuMeter"></div></div>
          </article>
          <article class="metric-card">
            <span>RAM</span>
            <strong id="ramValue">--%</strong>
            <div class="meter"><div id="ramMeter"></div></div>
          </article>
          <article class="metric-card">
            <span>Disk</span>
            <strong id="diskValue">--%</strong>
            <div class="meter"><div id="diskMeter"></div></div>
          </article>
          <article class="metric-card">
            <span>Uptime</span>
            <strong id="uptimeValue">--</strong>
            <small>Host runtime</small>
          </article>
        </section>

        <section id="services" class="panel-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Whitelisted systemd units</p>
              <h3>Services</h3>
            </div>
            <button id="refreshStatusButton" class="ghost-button" type="button">Refresh</button>
          </div>

          <div id="servicesGrid" class="service-grid"></div>
          <p id="serviceMessage" class="message" role="status"></p>
        </section>

        <section id="projects" class="panel-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Deployments</p>
              <h3>Projects</h3>
            </div>
          </div>
          <form id="projectForm" class="inline-form admin-only">
            <input name="name" type="text" placeholder="Project name" required minlength="2">
            <input name="slug" type="text" placeholder="project-slug" required pattern="[a-z0-9][a-z0-9-]{1,78}[a-z0-9]">
            <input name="path" type="text" placeholder="/srv/my-project" required>
            <button type="submit">Add Project</button>
          </form>
          <div id="projectsGrid" class="project-grid"></div>
        </section>

        <section id="access" class="panel-section admin-only">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Global users and project roles</p>
              <h3>User Management</h3>
            </div>
          </div>

          <form id="userForm" class="inline-form">
            <input name="username" type="text" placeholder="Username" required minlength="3">
            <input name="password" type="password" placeholder="Password" required minlength="8">
            <select name="role" required>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit">Add User</button>
          </form>

          <form id="memberForm" class="inline-form">
            <select name="projectId" required>
              <option value="">Project</option>
            </select>
            <select name="userId" required>
              <option value="">User</option>
            </select>
            <select name="role" required>
              <option value="user">Project User</option>
              <option value="manager">Project Manager</option>
            </select>
            <button type="submit">Assign</button>
          </form>

          <div id="usersTable" class="table-panel"></div>
          <p id="accessMessage" class="message" role="status"></p>
        </section>
      </main>
    </div>

    <script src="/notifications.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
